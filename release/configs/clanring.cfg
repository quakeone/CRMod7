// ================================================================================================
//
//  C L A N R I N G . C F G  -  Main Server Configuration
//
//  How this file works:
//    - Global commands run every time the server starts a new level.
//    - The -init- section runs ONCE on first server start, never again.
//    - Mode sections (-ffa-, -practice-, -match-tdm-, etc.) only run when
//      the server enters that specific mode. Settings here override globals.
//
// ================================================================================================


////////////////////////////////////////////////////////////////////////////////////////////////////
//                                                                                                //
//                              GLOBAL  -  Admin Authentication                                   //
//                                                                                                //
////////////////////////////////////////////////////////////////////////////////////////////////////

// Main admin passcode (4-7 digits, first digit must be non-zero).
// This is the "super admin" - can kick any other admin. Shows as code 0.
// Only give this to people you fully trust.
setadmin 1234567

// Additional admin passcodes (slots 1-9). Same format as above.
// These admins CANNOT kick other admins.
// IMPORTANT: No passcode should be a prefix of another (e.g. 1234 and 1234567
// would prevent the longer code from ever working).
//setadmin2 1234567
//setadmin3 1234567
//setadmin4 1234567
//setadmin5 1234567
//setadmin6 1234567
//setadmin7 1234567
//setadmin8 1234567
//setadmin9 1234567


////////////////////////////////////////////////////////////////////////////////////////////////////
//                                                                                                //
//                              GLOBAL  -  Webhooks & Integrations                                //
//                                                                                                //
////////////////////////////////////////////////////////////////////////////////////////////////////

// Discord webhook for CTF cap time notifications (supports up to 3 comma-separated URLs)
captimesdiscordurl https://discord.com/api/webhooks/1234567, https://discord.com/api/webhooks/1234567

// Discord webhook for end-of-match stats (supports up to 3 comma-separated URLs)
statsdiscordurl https://discord.com/api/webhooks/1234567, https://discord.com/api/webhooks/1234567

// External match result reporting endpoint
matchposturl @http://11:00000000-0000-0000-0000-000000000000@servers.quakeone.com/api/servers/match

// Google Sheets integration for cap time record tracking
googlesheetsurl https://script.google.com/macros/s/1234567/exec
googlesheetsapikey 1234567


////////////////////////////////////////////////////////////////////////////////////////////////////
//                                                                                                //
//                              GLOBAL  -  Network                                                //
//                                                                                                //
////////////////////////////////////////////////////////////////////////////////////////////////////

// Server-to-client update frequency (lower = more updates = smoother movement).
// The classic 1999 standard was 0.5. Modern play benefits from faster rates.
ctfticrate 0.025
tdmticrate 0.025


////////////////////////////////////////////////////////////////////////////////////////////////////
//                                                                                                //
//                              GLOBAL  -  Core Gameplay                                          //
//                                                                                                //
////////////////////////////////////////////////////////////////////////////////////////////////////

// Powerup spawning defaults (individual modes can override these below)
quadon              // Quad Damage spawns on the map
ringoff             // Ring of Shadows (invisibility) does NOT spawn
pentoff             // Pentagram of Protection does NOT spawn
runesoff            // CTF runes (Haste, Regen, Resistance, Strength) disabled

noexit 1            // Players cannot trigger level exits in FFA or practice mode
pausable 0          // Players cannot pause the server (matches can still be paused via timerstop)


////////////////////////////////////////////////////////////////////////////////////////////////////
//                                                                                                //
//                              GLOBAL  -  Server Features                                        //
//                                                                                                //
////////////////////////////////////////////////////////////////////////////////////////////////////

// Auto-pause: automatically pauses an in-progress match when a player disconnects
autopauseon

// Match sounds: plays game-over music during the nextmap vote screen (~20 seconds)
// Track list configured in configs/matchsounds.cfg
matchsoundson

// Safe practice: prevents grenade/discharge spam in practice mode.
// Spamming grenades disarms the launcher; discharging in water kills the discharger only.
safepracticeoff


////////////////////////////////////////////////////////////////////////////////////////////////////
//                                                                                                //
//                              GLOBAL  -  Player Features                                        //
//                                                                                                //
////////////////////////////////////////////////////////////////////////////////////////////////////

// Leave Me Alone: lets players become intangible during match prewar
// (no damage, no pickups, no telefrag). Useful for AFK warmup.
cr_allow_leavemealone 1

// QuakeTag mini-games (mutually exclusive - if both set, qwsucks wins):
//   qwsucks = tag mode where "it" player glows; tag someone to pass it on
//   q14ever = cosmetic overlay variant (no tagging, just a visual prop)
cr_allow_qwsucks "1"
cr_allow_q14ever "1"


////////////////////////////////////////////////////////////////////////////////////////////////////
//                                                                                                //
//                              GLOBAL  -  Map Rotation                                           //
//                                                                                                //
////////////////////////////////////////////////////////////////////////////////////////////////////

// Randomize the starting map position when first entering a mode.
// 1 = pick a random starting spot in the rotation, 0 = always start at the first map.
// After the first map, rotation always continues sequentially regardless of this setting.
cr_dm_randomize_start 1     // FFA: randomize by default
cr_ra_randomize_start 1     // Rocket Arena: randomize by default
cr_hh_randomize_start 1     // Head Hunters: start at first map by default


////////////////////////////////////////////////////////////////////////////////////////////////////
//                                                                                                //
//                              INIT  -  One-Time Server Setup                                    //
//                                (runs once on first server start)                                //
//                                                                                                //
////////////////////////////////////////////////////////////////////////////////////////////////////

-init-

// Mode voting: lets players vote to switch between FFA, practice, and match modes
modevoteon

// AFK auto-kick timeout in minutes (0 = disabled). Players are warned first via setafk.
kickafk 0


////////////////////////////////////////////////////////////////////////////////////////////////////
//                                                                                                //
//                              MODE  -  Free-For-All (FFA)                                       //
//                                                                                                //
////////////////////////////////////////////////////////////////////////////////////////////////////

-ffa-
timelimit 10
fraglimit 40
deathmatch 3        // 3 = weaponstay on (weapons don't disappear after pickup)
powerupdropon       // Killed players drop held powerups (quad, ring, suit)
matchsoundson
// teamplay 1       // Uncomment to enable pub team DM (undocumented/experimental)


////////////////////////////////////////////////////////////////////////////////////////////////////
//                                                                                                //
//                              MODE  -  Head Hunters (FFA)                                       //
//                                                                                                //
////////////////////////////////////////////////////////////////////////////////////////////////////

-ffa-hh-
timelimit 10
fraglimit 100
deathmatch 3        // weaponstay on
powerupdropon       // Killed players drop held powerups
matchsoundson


////////////////////////////////////////////////////////////////////////////////////////////////////
//                                                                                                //
//                              MODE  -  Head Hunters (Team)                                      //
//                                                                                                //
////////////////////////////////////////////////////////////////////////////////////////////////////

-team-hh-
timelimit 10
fraglimit 100
deathmatch 3        // weaponstay on
powerupdropon       // Killed players drop held powerups
matchsoundson


////////////////////////////////////////////////////////////////////////////////////////////////////
//                                                                                                //
//                              MODE  -  Public CTF (Pickup)                                      //
//                                                                                                //
////////////////////////////////////////////////////////////////////////////////////////////////////

-pub-ctf-
timelimit 10
fraglimit 100
deathmatch 1        // 1 = weaponstay off (weapons disappear after pickup)
runeson             // CTF runes enabled (Haste, Regen, Resistance, Strength)
powerupdropon       // Killed players drop held powerups
matchsoundsoff


////////////////////////////////////////////////////////////////////////////////////////////////////
//                                                                                                //
//                              MODE  -  Practice                                                 //
//                        (free roam, no scoring, all items)                                      //
//                                                                                                //
////////////////////////////////////////////////////////////////////////////////////////////////////

-practice-
timelimit 0         // No time limit
fraglimit 0         // No frag limit
safepracticeon      // Anti-spam: limits grenade spam, discharge kills self only
powerupdropon       // Killed players drop held powerups
matchsoundsoff
ringon              // Ring of Shadows spawns for practice
penton              // Pentagram of Protection spawns for practice


////////////////////////////////////////////////////////////////////////////////////////////////////
//                                                                                                //
//                              MODE  -  Match: Team Deathmatch                                   //
//                             (competitive, scored, regulated)                                    //
//                                                                                                //
////////////////////////////////////////////////////////////////////////////////////////////////////

-match-tdm-
teamplay 2          // 2 = friendly fire ON (team damage enabled)
timelimit 20
setovertime 5       // Overtime period in minutes if match is tied
deathmatch 3        // weaponstay on
powerupdropoff      // Powerups are NOT dropped on death (competitive standard)
matchsoundsoff
ringoff             // Ring of Shadows disabled for competitive play
pentoff             // Pentagram disabled for competitive play


////////////////////////////////////////////////////////////////////////////////////////////////////
//                                                                                                //
//                              MODE  -  Match: CTF                                               //
//                             (competitive, scored, regulated)                                    //
//                                                                                                //
////////////////////////////////////////////////////////////////////////////////////////////////////

-match-ctf-
timelimit 20
setovertime 5       // Overtime period in minutes if match is tied
deathmatch 1        // weaponstay off (standard for CTF matches)
powerupdropoff      // Powerups are NOT dropped on death (competitive standard)
matchsoundsoff
pentoff             // Pentagram disabled for competitive CTF
ringoff             // Ring of Shadows disabled for competitive CTF
