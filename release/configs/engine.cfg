// ================================================================================================
//
//  E N G I N E . C F G  -  Engine-Level Server Settings
//
//  This file is called "engine" because everything in it is a Quake engine
//  cvar or command — settings that exist regardless of which mod is loaded.
//  The mod's own gameplay settings (admin codes, powerups, mode rules, etc.)
//  live in clanring.cfg instead.
//
//  Loaded from server.cfg at the mod root:  exec "configs/engine.cfg"
//  Runs once at engine startup, before the mod initializes.
//
// ================================================================================================


////////////////////////////////////////////////////////////////////////////////////////////////////
//                                                                                                //
//                              Startup  -  Initial Mode & Map                                    //
//                                                                                                //
////////////////////////////////////////////////////////////////////////////////////////////////////

// Print to console to confirm engine.cfg loaded
echo "CRMod7 engine.cfg loaded -- 3/20/2026"

// cr_startmode is a one-shot startup seed read by CRMod7 before first
// worldspawn. The mod manages samelevel itself at runtime, so startup configs
// no longer need to set samelevel directly.
//
// Base modes for Deathmatch / CTF (pick one):
//   1         FFA (free-for-all)
//   2         Match (competitive)
//   4         Practice (free roam, no scoring)
//
// Add-on type bit for the base modes above:
//   1024      Capture the Flag   (combine with 1, 2, or 4)
//
// Standalone modes (no base bit needed):
//   65536     Airshot
//   1048576   DMM4 (spawn with all weapons)
//   4194304   Clan Arena
//   8388608   Rocket Arena
//   16777216  Head Hunters
//
// Common cr_startmode values:
//   1         FFA Deathmatch
//   2         Match Deathmatch
//   4         Practice DM
//   1024      CTF shorthand; first boot falls back to Match CTF
//   1025      FFA CTF            (1 + 1024)
//   1026      Match CTF          (2 + 1024)
//   1028      Practice CTF       (4 + 1024)
//   65536     Airshot
//   1048576   DMM4
//   4194304   Clan Arena
//   4227072   Wipeout            (4194304 + 32768)
//   8388608   Rocket Arena
//   16777216  Head Hunters
//
// Head Hunters startup variant is controlled by teamplay:
//   teamplay 0    Head Hunters FFA
//   teamplay 1    Team Head Hunters
//
// Legacy startup configs that still use "samelevel" should be updated to
// "set cr_startmode ...". CRMod7 still imports old samelevel values in the
// editor for compatibility, but runtime mode state stays in samelevel.
set cr_startmode 2

// The first map loaded when the server starts
map aerowalk


////////////////////////////////////////////////////////////////////////////////////////////////////
//                                                                                                //
//                              Server Identity                                                   //
//                                                                                                //
////////////////////////////////////////////////////////////////////////////////////////////////////

// Server name shown in the server browser and on connect
hostname "CRMod 7 - xyz.abc.com"

// Whether to advertise on master server lists (1 = public, 0 = unlisted)
sv_public 1

// Override the default master server addresses (empty = disable that master)
// QSS/QSM defaults: master.frag-net.com, dpmaster.deathmask.net, dpmaster.tchr.no
net_masterextra1 "master.frag-net.com"
net_masterextra2 ""
net_masterextra3 ""


////////////////////////////////////////////////////////////////////////////////////////////////////
//                                                                                                //
//                              Network                                                           //
//                                                                                                //
////////////////////////////////////////////////////////////////////////////////////////////////////

// Seconds before a non-responsive client is kicked (ghost client cleanup)
net_messagetimeout 60


////////////////////////////////////////////////////////////////////////////////////////////////////
//                                                                                                //
//                              Engine & Physics Fixes                                            //
//                                                                                                //
////////////////////////////////////////////////////////////////////////////////////////////////////

// Fix grenades making horrible buzzing noises when sliding on sloped surfaces
sv_gameplayfix_bouncedownslopes 1

// Whether to load external .vis files from the maps folder (0 = use BSP-embedded vis data)
external_vis 0

// Player view pitch limits (0 = original Quake limits, 1 = unrestricted up/down look)
sv_fullpitch 0

// sys_throttle .002  // Makro (Ironwail) suggestion — no effect on dedicated servers


////////////////////////////////////////////////////////////////////////////////////////////////////
//                                                                                                //
//                              Server Passwords                                                  //
//                                                                                                //
//  These are engine-level passwords enforced by QSS itself.                             //
//  The mod has its own separate admin passcodes in clanring.cfg (setadmin).                       //
//                                                                                                //
////////////////////////////////////////////////////////////////////////////////////////////////////

// Server connect password — makes the server private.
// Clients must type "password <value>" in console before connecting.
// password 123

// Remote console password — allows remote server administration.
// Clients type "rcon_password <value>" then issue commands with "rcon <command>".
// Example: rcon changelevel ctf8
// rcon_password 123
