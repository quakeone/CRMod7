// ================================================================================================
//
//  L E V E L S . C F G  -  Map Rotation
//
//  Defines the sequential map rotation for each game mode. After each game
//  ends, the server advances to the next map in the current mode's list.
//  When the end of a list is reached, it loops back to the top.
//
//  By default, RA and FFA DM randomize their starting position on first
//  entry, then continue sequentially. This is controlled per mode via
//  cr_dm_randomize_start, cr_ra_randomize_start, and cr_hh_randomize_start
//  in clanring.cfg.
//
//  Rules:
//    - List .bsp filenames only (no extension)
//    - 128 maps max per mode
//    - Modes: -ctf-, -dm-, -ca-, -ra-, -hh-
//
// ================================================================================================


