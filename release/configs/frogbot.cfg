//
// frogbot.cfg
//
// Configuration file for Frogbot AI settings.
//
// This file is read at level change. Place it alongside clanring.cfg
// in your mod's configs/ directory.
//
// All values shown below are the compiled-in defaults.
// Uncomment and change a line to override.
//

// ===================================================================
// GENERAL
// ===================================================================

// Automatically load route files on map start (0 = manual only)
//frogbot_autoload_routes 1

// Directory for per-map route files, relative to game root
//frogbot_route_dir "bots/maps"

// Default bot skill level (0-20); controls reaction time and accuracy
//frogbot_skill 10

// Enable aim error system: bots briefly miss on target acquire and
// when targets move erratically (0 = perfect aim)
//frogbot_aim_error 1

// Remove all bots on next map change, then resets to 0
//frogbot_purge_next_map 0

// Debug verbosity: 0=off, 1=server console, 2=broadcast, 3-4=trace
//frogbot_debug 0

// Extra per-frame path/combat trace logging (requires debug >= 1)
//frogbot_debug_trace 0

// ===================================================================
// COMBAT
// ===================================================================

// Master combat switch (0 = bots never fight)
//frogbot_combat 1

// Max distance (units) at which bots engage enemies
//frogbot_combat_range 1100

// Seconds between full enemy-list scans
//frogbot_combat_scan_interval 0.2

// Enable strafing/dodging during combat
//frogbot_combat_strafe 1

// Fractional scale (0-1) for projectile lead prediction (0 = no lead)
//frogbot_combat_lead 0.55

// Enable missile dodge: bots strafe away from incoming rockets/grenades
//frogbot_missile_dodge 1

// ===================================================================
// COMBAT - ESCAPE / RETREAT
// ===================================================================

// Enable retreat when outmatched or low on health
//frogbot_combat_escape 1

// Max enemy distance (units) to consider retreating
//frogbot_combat_escape_enemy_dist 650

// Max search radius (units) for a safe escape waypoint
//frogbot_combat_escape_max_dist 900

// Enemy strength ratio threshold to trigger retreat
//frogbot_combat_escape_ratio 1.25

// Absolute minimum hp+armor below which bot always retreats
//frogbot_combat_escape_min_strength 130

// Seconds to hold retreat state after triggering
//frogbot_combat_escape_hold 1.25

// Min interval (seconds) between successive escape activations
//frogbot_combat_escape_cooldown 0.85

// Enable random evasive jumps while retreating
//frogbot_combat_escape_jump 1

// ===================================================================
// SPLASH DAMAGE / FRIENDLY FIRE
// ===================================================================

// Enable projectile self-damage gating
//frogbot_splash_safety 1

// Use KTX splash formula (80-0.25*dist); 0 = old fixed-distance check
//frogbot_splash_use_ktx_formula 1

// Extra hp margin added to self-damage threshold before firing
//frogbot_splash_safety_margin 0

// Forward trace distance (units) to detect nearby walls for blowback
//frogbot_splash_trace_dist 112

// Legacy min enemy distance for projectiles (used when ktx formula off)
//frogbot_projectile_min_dist 180

// Max distance (units) to check for teammates in the fire lane
//frogbot_ff_dist 420

// Dot-product threshold for friendly fire cone (higher = narrower)
//frogbot_ff_cone 0.95

// ===================================================================
// VISIBILITY / TARGET SELECTION
// ===================================================================

// Allow 360-degree enemy detection (0 = front arc only)
//frogbot_visibility_scan_360 1

// Dot-product threshold for "front arc" when 360 scan is off
//frogbot_visibility_front_min_dot 0.2

// Enable multi-point visibility checks (eye, head, feet)
//frogbot_visibility_multi 1

// Prefer best visible target over best scored but obscured target
//frogbot_visibility_multi_entity 1

// Score penalty for enemies outside front arc (behind the bot)
//frogbot_visibility_back_penalty 180

// ===================================================================
// POWERUP AWARENESS
// ===================================================================

// Enable powerup tracking on enemies (0 = ignore Quad/Pent)
//frogbot_powerup_awareness 1

// Seconds to remember an enemy had a powerup after losing sight
//frogbot_powerup_memory 2.5

// Enemy strength multiplier when they have Quad
//frogbot_powerup_quad_threat 1.6

// Enemy strength multiplier when they have Pent
//frogbot_powerup_pent_threat 2.4

// Reduce enemy threat multiplier when bot itself has Quad
//frogbot_powerup_self_quad_relief 0.6

// Reduce enemy threat multiplier when bot itself has Pent
//frogbot_powerup_self_pent_relief 0.3

// Score penalty for targeting an enemy who has a powerup the bot lacks
//frogbot_powerup_target_penalty 350

// Enable team-say callouts for enemy powerup sightings
//frogbot_powerup_comms 1

// Min interval (seconds) between powerup callout messages per bot
//frogbot_powerup_comms_cooldown 12

// ===================================================================
// TEAM COMMUNICATIONS
// ===================================================================

// Enable bot team-chat messages (spotted, lost, need help, etc.)
//frogbot_team_comms 1

// Min interval (seconds) between team-say messages per bot
//frogbot_team_comms_cooldown 8

// Seconds after losing sight before announcing "lost enemy"
//frogbot_team_comms_lost_delay 10

// Enable periodic location callouts using .loc file data
//frogbot_loc_reports 1

// Seconds between location reports per bot
//frogbot_loc_report_interval 20

// ===================================================================
// ROUTING / NAVIGATION
// ===================================================================

// Flat bonus to route score when next marker has a goal item
//frogbot_goal_bias 1.1

// Max seconds ahead to speculate about item respawn timers
//frogbot_goal_wait_max 20

// Scale for Bellman-Ford route-potential delta (higher = stronger pull)
//frogbot_route_potential_bias 0.7

// Relaxation passes for route potential cache (0 = auto)
//frogbot_route_relax_passes 0

// Score bonus for path-hint flagged route steps
//frogbot_path_hint_bias 0.65

// Upward velocity bias (units/s) for underwater navigation
//frogbot_water_vertical_bias 36

// ===================================================================
// ROCKET JUMPING
// ===================================================================

// Enable rocket-jump path edges (0 = never RJ)
//frogbot_enable_rj 1

// Extra time cost added to RJ edges in route computation
//frogbot_route_rj_cost 0.6

// Min combined hp+armor before attempting RJ (Quad/Pent bypass)
//frogbot_rj_min_hp_armor 95

// Min horizontal speed (units/s) required to fire the RJ rocket
//frogbot_rj_speed_min 200

// ===================================================================
// ZONE SYSTEM
// ===================================================================

// Enable zone-based routing (0 = skip zone ETAs and progress biases)
//frogbot_zone_system 1

// Bonus when next marker shares the bot's current zone
//frogbot_zone_stickiness 0.45

// Scale for positive ETA delta (getting closer to zone goal)
//frogbot_zone_progress_bias 0.8

// Scale for negative ETA delta (backtracking through zones)
//frogbot_zone_detour_penalty 0.6

// Bonus when the step matches the zone's recommended next marker
//frogbot_zone_next_bias 0.55

// Validate zone cache after building; reject if too many failures
//frogbot_zone_validate 1

// Max fraction of unresolved markers before zone cache is rejected
//frogbot_zone_validate_fail_ratio 0.45

// Relaxation passes for zone ETA cache (0 = auto)
//frogbot_zone_relax_passes 0

// ===================================================================
// VIRTUAL GOALS
// ===================================================================

// Enable scoring unavailable/respawning items as route incentives
//frogbot_virtual_goals 1

// Multiplier on desire score for virtual goal items
//frogbot_virtual_goal_bias 1.25

// Enable zone-anchored virtual goals for not-yet-available items
//frogbot_zone_virtual_goals 1

// Scale for zone virtual goal score nudging
//frogbot_zone_virtual_bias 0.32

// Bonus for an equivalent available item vs unavailable zone anchor
//frogbot_zone_virtual_available_bias 0.35

// ===================================================================
// ITEMS
// ===================================================================

// Interval (seconds) for recomputing health/armor/weapon desire
//frogbot_item_desire_refresh 0.35

// Scale factor converting raw desire (>5) into route bonus
//frogbot_item_desire_scale 0.06

// Scale factor for small desire values (<=5)
//frogbot_item_desire_small_scale 0.35

// ===================================================================
// CAMPING
// ===================================================================

// Enable camping behavior (auto-disabled in arena/CTF/wipeout)
//frogbot_camp_logic 1

// Probability (0-1) of entering camp mode per retry cycle
//frogbot_camp_chance 0.3

// Seconds between camp eligibility checks
//frogbot_camp_retry 4

// Min seconds to hold a camp position
//frogbot_camp_hold_min 3

// Max seconds to hold a camp position (actual is random min-max)
//frogbot_camp_hold_max 8

// Cancel camp if enemy comes within this distance (units)
//frogbot_camp_enemy_dist 520

// Multiplier on per-step ETA bonus when routing to camp marker
//frogbot_camp_route_bias 1.1

// Flat bonus when next step IS the camp marker
//frogbot_camp_goal_bias 2.2

// ===================================================================
// HAZARD AVOIDANCE
// ===================================================================

// Filter hazard markers from path planning and penalize in scoring
//frogbot_avoid_hazards 1

// Cost multiplier per hazard level for lava/slime markers
//frogbot_hazard_penalty 2.4

// Seconds without progress before rebinding while in a hazard
//frogbot_hazard_rebind_time 1.1

// Enable active escape override when in lava/slime
//frogbot_hazard_escape 1

// Max search radius (units) for an escape marker in a hazard
//frogbot_hazard_escape_dist 512

// Enable forward-trace obstruction detection and side-strafe unstick
//frogbot_blocked_avoid 1

// Forward trace length (units) to detect blocking geometry
//frogbot_blocked_trace_dist 54

// ===================================================================
// NAVIGATION - TRANSITIONS / RECOVERY
// ===================================================================

// Master switch for advanced stuck/desync recovery system
//frogbot_advanced_recovery 1

// Consider marker reached when stuck if within this distance (0=off)
//frogbot_soft_reach_dist 0

// Allow vertical platform path edges (0 = skip those edges)
//frogbot_allow_vertical_paths 0

// Distance jump per frame that triggers a desync rebind
//frogbot_desync_rebind_dist 900

// Seconds after teleport where teleport-safe guards stay active
//frogbot_desync_tp_grace 0.8

// Frame-to-frame positional jump (units) that counts as a warp
//frogbot_transition_warp_dist 320

// Radius for transition marker activation of desync/reanchor guards
//frogbot_transition_context_dist 224

// Distance for immediate snap on desync/transition rebind
//frogbot_transition_snap_dist 192

// Re-snap to nearest visible marker near transitions (0 = off)
//frogbot_transition_reanchor_dist 0

// Multiplier on reanchor dist when a warp is detected
//frogbot_transition_reanchor_warp_mult 4

// Suppress reanchor if target marker is closer than this
//frogbot_transition_reanchor_target_dist 900

// Guard threshold: skip reanchor if both markers within this distance
//frogbot_transition_mismatch_dist 320

// Stuck bot near transition rebinds via transition path instead
//frogbot_transition_stuck_rebind 1

// Snap distance for stuck/no-path rebind to nearest recover marker
//frogbot_recover_snap_dist 96

// Max distance for matching route marker to teleport source entity
//frogbot_post_tp_source_match_dist 96

// Snap distance to closest matching source marker after teleport
//frogbot_post_tp_bind_dist 192

// Force immediate rebind if stuck and farther than this from target
//frogbot_force_rebind_dist 0

// ===================================================================
// MARKER SYSTEM
// ===================================================================

// Base block duration (seconds) after a stuck event at a marker
//frogbot_marker_block_time 2

// Extra seconds per successive stuck hit beyond the first
//frogbot_marker_block_scale 1

// Maximum total block duration (seconds) per marker
//frogbot_marker_block_max 6

// Consecutive stuck hits on same marker to force immediate rebind
//frogbot_marker_force_rebind_hits 2

// ===================================================================
// DYNAMIC BACKFILL
// ===================================================================

// Enable dynamic-marker seeding from backfill entity classes
//frogbot_dynamic_backfill 1

// Re-scan world for dynamic source entities on route load
//frogbot_dynamic_source_refresh 1

// Max distance to match a route marker to a live entity
//frogbot_dynamic_source_match_dist 128

// Allow live (non-preserved) entities to create markers as fallback
//frogbot_dynamic_seed_live_fallback 1

// Min separation (units) between existing markers and new candidates
//frogbot_dynamic_seed_origin_eps 16

// Last-resort: reuse any known source to pad marker count
//frogbot_dynamic_force_fill 1

// ===================================================================
// CTF
// ===================================================================

// Master switch for CTF-specific logic (roles, flag scoring, escort)
//frogbot_ctf_objectives 1

// Base seconds between role re-evaluations
//frogbot_ctf_role_interval 5

// Random jitter (seconds) added to role interval
//frogbot_ctf_role_jitter 2

// Route hops within which escort considers itself near the carrier
//frogbot_ctf_escort_support_hops 2

// Seconds escort pauses near carrier when in support range
//frogbot_ctf_escort_hold_time 1.5

// Radius (units) for flag carrier to grab nearby health/armor/ammo
//frogbot_ctf_microloot_radius 160

// Score bonus for targeting the enemy flag carrier
//frogbot_ctf_carrier_target_bonus 500

// Multiplier on own-flag return goal scores
//frogbot_ctf_return_urgency 1.2

// Enable CTF team-say messages (cover me, flag dropped, etc.)
//frogbot_ctf_comms 1

// Min interval (seconds) between CTF team-say messages per bot
//frogbot_ctf_comms_cooldown 10

// Allow bots to fire grapple while in transit to boost speed
//frogbot_ctf_hook_transit 0

// Use grapple as substitute for rocket-jump on flagged path edges
//frogbot_hook_climb 1

// Always prefer hook over RJ on eligible edges (0 = only when low hp)
//frogbot_hook_climb_prefer 0
