// castlev2.cfg - Castle Ver. 2
//
// Per-map overrides (loaded after clanring.cfg). Only settings that differ
// from the defaults need to be listed here.

-match-tdm-
deathmatch 1        // weaponstay OFF - standard for castlev2 TDM matches (item control map)
penton              // Pentagram enabled - map is balanced around pent control
ringon              // Ring of Shadows enabled - map is balanced around ring control
timelimit 10        // Shorter timelimit (default is 20 for match TDM)
