// fteqcc limit overrides for CRMod7
// Source reference: fteqw/engine/qclib/qccmain.c
//
// Active override:
// - MAX_STRINGS raises the global string-literal table cap.
//   This project exceeded the default after Frogbot + QuakeTag growth.
//
// Notes learned from source:
// - Default MAX_STRINGS is 1<<21 (2,097,152 bytes).
// - qcc.cfg is auto-read by fteqcc from the process working directory.
// - Keep this file in the same directory as fteqcc for this repo:
//     /home/woods/codedev/CRMod7/
//   Example commands (run from compiler directory):
//     cd /home/woods/codedev/CRMod7 && ./fteqcc64 -src src
//     cd /home/woods/codedev/CRMod7 && /home/woods/codedev/CRMod7/fteqcc64 -src src
// - Unknown tokens print: "Bad token in qcc.cfg file".
// - '#' lines are not valid comments here; use '//' or '/* ... */'.
// - CLI flags (for one-off builds) can also override limits:
//   -max_strings, -max_globals, -max_fields, -max_statements,
//   -max_functions, -max_types, -max_temps, -max_macros, -max_regs
// - Supported qcc.cfg keys include:
//   MAX_REGS, MAX_STRINGS, MAX_GLOBALS, MAX_FIELDS, MAX_STATEMENTS,
//   MAX_FUNCTIONS, MAX_TYPES, MAX_TEMPS, CONSTANTS
// - "noduplicatestrings" optimization exists and is enabled by default
//   in this fteqcc build.
//
// Keep only MAX_STRINGS overridden for now; add other caps only if needed.
MAX_STRINGS 4000000
